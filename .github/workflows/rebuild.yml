name: Rebuild – Recalculate totals from donations.json

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not commit changes)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  rebuild:
    name: Recalculate summary
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Recalculate summary.json
        id: recalc
        run: |
          node - <<'EOF'
          const fs   = require('fs');
          const path = require('path');

          const donationsPath = path.join(process.cwd(), 'data', 'donations.json');
          const summaryPath   = path.join(process.cwd(), 'data', 'summary.json');

          const donationsData = JSON.parse(fs.readFileSync(donationsPath, 'utf8'));
          const summaryData   = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));

          const donations = donationsData.donations || [];
          const approved  = donations.filter(d => d.status === 'approved' || d.status === 'manual');

          const goal   = summaryData.goal || 3000000;
          const raised = approved.reduce((sum, d) => sum + (parseFloat(d.amount) || 0), 0);
          const count  = approved.length;
          const pct    = Math.min(100, Math.round((raised / goal) * 100));

          const newSummary = {
            goal,
            currency: summaryData.currency || 'COP',
            raised,
            donations_count: count,
            percentage: pct,
            last_updated: new Date().toISOString(),
          };

          console.log('Recalculated summary:', JSON.stringify(newSummary, null, 2));

          const dryRun = process.env.DRY_RUN === 'true';
          if (!dryRun) {
            fs.writeFileSync(summaryPath, JSON.stringify(newSummary, null, 2) + '\n');
            console.log('✅ summary.json updated');
          } else {
            console.log('ℹ️ Dry run – no changes written');
          }
          EOF
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}

      - name: Commit updated summary.json
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/summary.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: rebuild summary.json from donations [skip ci]"
            git push
          fi
